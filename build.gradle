plugins {
    id 'java'
    id 'application'
    id 'checkstyle'
    id 'maven-publish'
}

group = 'com.opitral'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    withSourcesJar()
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:6.0.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.junit.platform:junit-platform-suite'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

application {
    mainClass = 'com.opitral.Main'
}

// ---------------------------------------------------------------------------
// Static analysis (code style)
// ---------------------------------------------------------------------------
checkstyle {
    toolVersion = '10.21.0'
    configFile = file('config/checkstyle/checkstyle.xml')
    maxWarnings = 0
}

// ---------------------------------------------------------------------------
// Testing: split into tag-based test sets
//   ./gradlew test            -> only @Tag("unit")  tests (fast)
//   ./gradlew integrationTest -> only @Tag("integration") tests (slow)
//   ./gradlew check           -> static analysis + both test sets
// ---------------------------------------------------------------------------
tasks.named('test', Test) {
    description = 'Runs the fast unit test set (@Tag("unit")).'
    useJUnitPlatform {
        includeTags 'unit'
        // Use the Jupiter engine directly; the @Suite classes (suite engine) are
        // kept for IDE / standalone use and must not double-run here.
        includeEngines 'junit-jupiter'
    }
    testLogging {
        events 'passed', 'skipped', 'failed'
    }
}

tasks.register('integrationTest', Test) {
    description = 'Runs the slow integration test set (@Tag("integration")).'
    group = 'verification'
    useJUnitPlatform {
        includeTags 'integration'
        includeEngines 'junit-jupiter'
    }
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    shouldRunAfter('test')
    testLogging {
        events 'passed', 'skipped', 'failed'
    }
}

tasks.named('check') {
    dependsOn 'integrationTest'
}

// ---------------------------------------------------------------------------
// Packaging: produce a runnable JAR
// ---------------------------------------------------------------------------
jar {
    manifest {
        attributes(
            'Main-Class': application.mainClass.get(),
            'Implementation-Title': project.name,
            'Implementation-Version': project.version
        )
    }
}

// ---------------------------------------------------------------------------
// Publishing: push the JAR to GitHub Packages (Maven registry)
// Credentials are read from the environment (set automatically in CI).
// ---------------------------------------------------------------------------
publishing {
    publications {
        maven(MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            name = 'GitHubPackages'
            def repo = System.getenv('GITHUB_REPOSITORY') ?: 'OWNER/REPOSITORY'
            url = uri("https://maven.pkg.github.com/${repo}")
            credentials {
                username = System.getenv('GITHUB_ACTOR')
                password = System.getenv('GITHUB_TOKEN')
            }
        }
    }
}
